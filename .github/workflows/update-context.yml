name: Update project context

on:
  push:
    branches: [main]
    paths-ignore:
      - 'context/**'

jobs:
  update-context:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 10

      - name: Update context via Claude
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          python3 << 'PYEOF'
          import os, json, urllib.request, subprocess

          api_key = os.environ["ANTHROPIC_API_KEY"]

          with open("context/current-state.md", "r") as f:
              current_state = f.read()

          commits = subprocess.check_output(
              ["git", "log", "--oneline", "-5"], text=True
          ).strip()

          prompt = (
              "Update this project context file based on recent git commits.\n\n"
              "Current context:\n"
              + current_state
              + "\n\nRecent commits:\n"
              + commits
              + "\n\nInstructions:\n"
              "- Update the What's done section to reflect completed work from commits\n"
              "- Update the What's next section based on what logically follows\n"
              "- Update the status line if the phase has changed\n"
              "- Keep the exact same markdown format and structure\n"
              "- Output only the updated markdown content, nothing else"
          )

          payload = {
              "model": "claude-haiku-4-5-20251001",
              "max_tokens": 1024,
              "messages": [{"role": "user", "content": prompt}]
          }

          req = urllib.request.Request(
              "https://api.anthropic.com/v1/messages",
              data=json.dumps(payload).encode(),
              headers={
                  "x-api-key": api_key,
                  "anthropic-version": "2023-06-01",
                  "content-type": "application/json"
              }
          )

          with urllib.request.urlopen(req) as res:
              data = json.loads(res.read())
              updated = data["content"][0]["text"]

          with open("context/current-state.md", "w") as f:
              f.write(updated)

          print("Context updated successfully")
          PYEOF

      - name: Commit updated context
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --quiet context/current-state.md; then
            echo "No context changes to commit"
          else
            git add context/current-state.md
            git commit -m "chore: auto-update project context [skip ci]"
            git push
          fi
