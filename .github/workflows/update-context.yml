name: Update project context

on:
  push:
    branches: [main]
    paths-ignore:
      - 'context/**'

jobs:
  update-context:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 10

      - name: Get recent commits
        id: commits
        run: |
          echo "COMMITS<<EOF" >> $GITHUB_OUTPUT
          git log --oneline -5 >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Read current context
        id: context
        run: |
          echo "CURRENT_STATE<<EOF" >> $GITHUB_OUTPUT
          cat context/current-state.md >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Update context via Claude
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          CURRENT_STATE='${{ steps.context.outputs.CURRENT_STATE }}'
          COMMITS='${{ steps.commits.outputs.COMMITS }}'

          python3 << 'PYEOF'
          import os, json, urllib.request

          api_key = os.environ["ANTHROPIC_API_KEY"]
          current_state = os.environ.get("CURRENT_STATE", "")
          commits = os.environ.get("COMMITS", "")

          with open("context/current-state.md", "r") as f:
              current_state = f.read()

          import subprocess
          commits = subprocess.check_output(
              ["git", "log", "--oneline", "-5"], text=True
          ).strip()

          prompt = f"""Update this project context file based on recent git commits.

          Current context:
          {current_state}

          Recent commits:
          {commits}

          Instructions:
          - Update the "What's done" section to reflect completed work from commits
          - Update the "What's next" section based on what logically follows
          - Update the status line if the phase has changed
          - Keep the exact same markdown format and structure
          - Output only the updated markdown content, nothing else, no preamble"""

          payload = {
              "model": "claude-haiku-4-5-20251001",
              "max_tokens": 1024,
              "messages": [{"role": "user", "content": prompt}]
          }

          req = urllib.request.Request(
              "https://api.anthropic.com/v1/messages",
              data=json.dumps(payload).encode(),
              headers={
                  "x-api-key": api_key,
                  "anthropic-version": "2023-06-01",
                  "content-type": "application/json"
              }
          )

          with urllib.request.urlopen(req) as res:
              data = json.loads(res.read())
              updated = data["content"][0]["text"]

          with open("context/current-state.md", "w") as f:
              f.write(updated)

          print("Context updated successfully")
          PYEOF

      - name: Commit updated context
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --quiet context/current-state.md; then
            echo "No context changes to commit"
          else
            git add context/current-state.md
            git commit -m "chore: auto-update project context [skip ci]"
            git push
          fi
